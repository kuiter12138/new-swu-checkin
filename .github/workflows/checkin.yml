name: 西南大学每日打卡

on:
  schedule:
    - cron: '30 15 * * *'        # 北京时间 23:30
  workflow_dispatch:              # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖（Chromium 浏览器 + 必要库）
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libgomp1

      - name: 验证 Chromium 安装
        run: |
          which chromium-browser
          chromium-browser --version

      - name: 测试目标网站连通性
        run: |
          echo "测试 https://of.swu.edu.cn 连通性..."
          curl -s -o /dev/null -w "HTTP状态码: %{http_code}\n" https://of.swu.edu.cn || echo "Curl 失败"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install drissionpage ddddocr requests

      - name: 列出已安装的 Python 包（调试用）
        run: pip list

      - name: 执行打卡脚本（无缓冲输出）
        env:
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
        run: |
          python -u checkin.py
