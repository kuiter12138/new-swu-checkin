name: SWU Daily Checkin

on:
  schedule:
    - cron: '30 13 * * *'   # 北京时间 21:30
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: '115'   # 关键：与 DrissionPage 4.1.1.4 兼容

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checkin script
        env:
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: python swu_auto_checkin.py
