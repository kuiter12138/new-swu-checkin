name: SWU Daily Checkin

on:
  schedule:
    # 北京时间 21:30 -> UTC 13:30
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run checkin script
        env:
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
        run: python swu_auto_checkin.py
