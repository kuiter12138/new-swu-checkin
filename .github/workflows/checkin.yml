name: SWU Daily Checkin

on:
  schedule:
    - cron: '30 13 * * *'   # 北京时间 21:30
  workflow_dispatch:

jobs:
  checkin:
    runs-on: self-hosted   # 自托管运行器标签
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checkin script
        env:
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
        run: python swu_auto_checkin.py
